import os


def _resolve_mlir_include(cfg):
  """Resolve the MLIR TableGen include directory from available config vars.

    Tries the following in order:
      1. config.mlir_src_root + "/include"
      2. external LLVM tree: <llvm_obj_root>/../mlir/include
      3. internal submodule: <circt_root>/llvm/mlir/include
    Returns the first valid path, or raises ValueError.
    """
  candidates = [
      os.path.join(cfg.mlir_src_root, "include"),
      os.path.join(os.path.dirname(cfg.llvm_obj_root), "mlir", "include"),
      os.path.join(cfg.circt_src_root, "llvm", "mlir", "include"),
  ]

  for path in candidates:
    opbase = os.path.join(path, "mlir", "IR", "OpBase.td")
    if os.path.isfile(opbase):
      return path

  raise ValueError(f"cannot locate MLIR TableGen includes. "
                   f"Have tried:\n  " + "\n  ".join(candidates))


circt_include = os.path.join(config.circt_src_root, "include")
mlir_include = _resolve_mlir_include(config)
example_include = os.path.join(config.circt_src_root, "examples",
                               "circt-standalone", "include")

config.substitutions.append(
    ("%TABLEGEN_INC%", f"-I {circt_include} -I {mlir_include}"))

# Share resolved paths with nested lit.local.cfg files in self-contained tests.
config.production_tablegen_includes = [
    circt_include,
    mlir_include,
]
config.example_tablegen_includes = [
    circt_include,
    mlir_include,
    example_include,
]
