import os
import sys

this_dir = os.path.dirname(os.path.abspath(__file__))
sys.path.insert(0, this_dir)

from self_contained_td_format import SelfContainedTDFormat

circt_tblgen = os.path.join(config.circt_tools_dir, "circt-tblgen")

production_td_dirs = [
    os.path.join(config.circt_src_root, "include"),
    os.path.join(config.circt_src_root, "lib"),
]
example_td_dirs = [
    os.path.join(config.circt_src_root, "examples"),
]

config.test_format = SelfContainedTDFormat(circt_tblgen)
config.test_format.add_dir_spec(config.production_tablegen_includes,
                                production_td_dirs)
config.test_format.add_dir_spec(config.example_tablegen_includes,
                                example_td_dirs)
