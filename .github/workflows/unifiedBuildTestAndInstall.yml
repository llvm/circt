name: Build, Test, and Install (Native)
description: |
  This reusable workflow is intended to be used to build dynamic or mostly
  static tools or CIRCT as a library.  This uses normal GitHub Actions runners
  and does not farm out work to containers.

  This is suitable if you are building Linux binaries or libraries for
  relatively newer Linux distributions.  The GitHub Linux runners will all use
  relatively new GNU C Library versions and these binaries will be usable for
  most users, but not for companies using ancient GNU C Library versions (e.g.,
  RHEL).

  This also should be suitable for building macOS or Windows binaries or
  libraries.

env:
  # The version of Verilator to install for Linux builds.
  verilator-version-linux: 5.046
  # The version of Yosys and sby to install for Linux builds.
  yosys-version-linux: 0.64

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "The GitHub runner to use"
        required: true
        type: choice
        options:
          - ubuntu-24.04
          - ubuntu-22.04
          - ubuntu-20.04
          - macos-15-large
          - macos-15
          - macos-14-large
          - macos-14
          - macos-13
          - windows-2022
          - windows-2019
      cmake_build_type:
        required: true
        type: choice
        options:
          - release
          - relwithdebinfo
          - debug
        default: relwithdebinfo
      build_shared_libs:
        required: true
        type: choice
        options:
          - on
          - off
        default: off
      llvm_enable_assertions:
        required: true
        type: choice
        options:
          - on
          - off
      run_tests:
        description: "Run tests"
        required: true
        type: boolean
        default: false
      run_integration_tests:
        description: "Run integration tests"
        required: false
        type: boolean
        default: false
      install_target:
        description: "Install steps to run (empty if do not install)"
        required: false
        type: string
      package_name_prefix:
        description: "The prefix for package name (has no effect unless \"install\" is set)"
        required: false
        type: string
      cmake_c_compiler:
        description: "The C compiler to use, the C++ compiler will be derived from this"
        required: true
        type: choice
        options:
          - clang
          - clang-10
          - clang-11
          - clang-12
          - clang-13
          - clang-14
          - clang-15
          - clang-16
          - clang-17
          - clang-18
          - clang-19
          - gcc
          - cl
        default: clang
      valgrind:
        description: "Enable valgrind in lit tests"
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      runner:
        description: "The GitHub runner to use"
        required: true
        type: string
      cmake_build_type:
        required: true
        type: string
      build_shared_libs:
        required: true
        type: string
      llvm_enable_assertions:
        required: true
        type: string
      run_tests:
        description: "If true, then run tests, otherwise skip tests"
        required: true
        type: boolean
      run_integration_tests:
        description: "Run integration tests"
        required: false
        type: boolean
      install_target:
        description: "Install steps to run"
        required: false
        type: string
      package_name_prefix:
        description: "The prefix for package name"
        required: false
        type: string
      cmake_c_compiler:
        description: "The C compiler to use, the C++ compiler will be derived from this"
        required: false
        type: string
        default: clang
      valgrind:
        description: "Enable valgrind in lit tests"
        required: false
        type: boolean
        default: false

jobs:
  build-test-and-install:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: write # Upload assets to release.
    steps:
# Canonicalize inputs (which could come from workflow_dispatch or workflow_call)
# which may be slightly different.  E.g., change `true` to `ON` or `Release` to
# `release`.  This guarantees that we get cache hits regardless of input casing.
      - name: Canonicalize inputs
        id: canonicalize
        shell: bash
        run: |
          on_off() {
            val=$(echo "$1" | tr '[:upper:]' '[:lower:]')
            case "$val" in
              on|true) echo "ON" ;;
              *) echo "OFF" ;;
            esac
          }
          echo "cmake_build_type=$(echo "${INPUT_BUILD_TYPE}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "cmake_c_compiler=$(echo "${INPUT_COMPILER}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "build_shared_libs=$(on_off "${INPUT_SHARED}")" >> $GITHUB_OUTPUT
          echo "llvm_enable_assertions=$(on_off "${INPUT_ASSERTIONS}")" >> $GITHUB_OUTPUT
        env:
          INPUT_BUILD_TYPE: ${{ inputs.cmake_build_type }}
          INPUT_COMPILER: ${{ inputs.cmake_c_compiler }}
          INPUT_SHARED: ${{ inputs.build_shared_libs }}
          INPUT_ASSERTIONS: ${{ inputs.llvm_enable_assertions }}
      - name: Clone llvm/circt
        uses: actions/checkout@v3
        with:
          fetch-depth: 2
          submodules: "true"
      - name: Unshallow llvm/circt
        run: |
          git fetch --unshallow --no-recurse-submodules
# Per-operating system setup
#
# Setup z3 for Linux and macOS.  This hasn't been working on Windows through
# `choco install z3`, so don't turn on z3 for those runs.
#
# Any runner-specific CMAKE configuration can be put into the `cmake` output.
# These will be used when running `cmake` later.
      - name: Setup (linux)
        id: setup-linux
        if: runner.os == 'Linux'
        run: |
          COMPILER="${{ steps.canonicalize.outputs.cmake_c_compiler }}"
          if [[ "$COMPILER" =~ ^clang-([0-9]+)$ ]]; then
            wget https://apt.llvm.org/llvm.sh
            chmod +x llvm.sh
            sudo ./llvm.sh "${BASH_REMATCH[1]}"
          fi

          sudo apt-get update
          sudo apt-get install "$COMPILER" iverilog libsystemc-dev ninja-build valgrind z3
          echo cmake="-DLLVM_ENABLE_Z3_SOLVER=ON" >> "$GITHUB_OUTPUT"
      - name: Restore Verilator Cache (Linux)
        if: inputs.run_integration_tests && runner.os == 'Linux'
        id: cache-verilator
        uses: actions/cache/restore@v4
        with:
          path: /opt/verilator
          key: verilator-${{ inputs.runner }}-${{ env.verilator-version-linux }}
      - name: Restore Yosys Cache (Linux)
        if: inputs.run_integration_tests && runner.os == 'Linux'
        id: cache-yosys
        uses: actions/cache/restore@v4
        with:
          path: /opt/yosys
          key: yosys-${{ inputs.runner }}-${{ env.yosys-version-linux }}
      - name: Integration Test Setup (Linux)
        if: inputs.run_integration_tests && runner.os == 'Linux'
        run: |
          echo /opt/verilator/bin >> "$GITHUB_PATH"
          echo /opt/yosys/bin >> "$GITHUB_PATH"

          # Verilator runtime dependencies.
          sudo apt-get update
          sudo apt-get install help2man perl make help2man libfl-dev libfl2 perl zlib1g zlib1g-dev

          if [[ "${{ steps.cache-verilator.outputs.cache-hit }}" != "true" ]]; then
            # Build and install Verilator from source.
            sudo apt-get install autoconf bison flex
            git clone https://github.com/verilator/verilator
            pushd verilator
            git checkout v${{ env.verilator-version-linux }}
            autoconf
            ./configure --prefix=/opt/verilator
            make install
            popd
          fi

          # Yosys runtime dependencies.
          sudo apt-get install libffi8 libreadline8t64 tcl zlib1g

          if [[ "${{ steps.cache-yosys.outputs.cache-hit }}" != "true" ]]; then
            # Build and install Yosys.
            sudo apt-get install build-essential clang bison flex libreadline-dev gawk tcl-dev libffi-dev git graphviz xdot pkg-config python3 zlib1g-dev
            git clone https://github.com/YosysHQ/yosys --recurse-submodules
            pushd yosys
            git checkout v${{ env.yosys-version-linux }}
            env PREFIX=/opt/yosys make install
            popd

            # Build and install sby.
            git clone https://github.com/YosysHQ/sby
            pushd sby
            pip config set global.break-system-packages true
            pip install click
            git checkout v${{ env.yosys-version-linux }}
            env PREFIX=/opt/yosys make install
            popd
          fi
      - name: Save Verilator Cache (Linux)
        if: inputs.run_integration_tests && runner.os == 'Linux' && github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.cache-verilator.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /opt/verilator
          key: verilator-${{ inputs.runner }}-${{ env.verilator-version-linux }}
      - name: Save Yosys Cache (Linux)
        if: inputs.run_integration_tests && runner.os == 'Linux' && github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.cache-yosys.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /opt/yosys
          key: yosys-${{ inputs.runner }}-${{ env.yosys-version-linux }}
      - name: Setup (macos)
        id: setup-macos
        if: runner.os == 'macOS'
        run: |
          brew install icarus-verilog gnu-tar ninja z3
          echo cmake="-DLLVM_ENABLE_Z3_SOLVER=ON" >> "$GITHUB_OUTPUT"
      - name: Integration Test Setup (MacOS)
        if: inputs.run_integration_tests && runner.os == 'macOS'
        run: |
          brew install verilator
          verilator --version
      - name: Setup (windows)
        id: setup-windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo setup=./utils/find-vs.ps1 >> "$GITHUB_OUTPUT"
      - name: Integration Test Setup (Generic)
        id: integration-test-setup-generic
        if: inputs.run_integration_tests
        run: |
          # Install Python dependencies for integration tests.
          pip config set global.break-system-packages true
          pip install pycapnp psutil pybind11==2.11.2 nanobind==2.9.2 numpy jinja2 cocotb~=1.9 cocotb_test~=0.2 click

          echo cmake="-DMLIR_ENABLE_BINDINGS_PYTHON=ON -DCIRCT_BINDINGS_PYTHON_ENABLED=ON" >> "$GITHUB_OUTPUT"
# Setup Caching.
#
# Caching has several constraints:
#
# 1. RelWithDebInfo and Debug builds require very large caches, roughly ~4.5GiB.
# 2. Release builds fit in ~100MiB.
# 3. Windows caching is broken on non-release builds [1].
#
# Taken together, disable caching on non-release builds.
#
# [1]: https://gitlab.kitware.com/cmake/cmake/-/issues/22529
      - name: sccache
        if: steps.canonicalize.outputs.cmake_build_type == 'release'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ inputs.runner }}-${{ steps.canonicalize.outputs.cmake_c_compiler }}-${{ steps.canonicalize.outputs.cmake_build_type }}-${{ steps.canonicalize.outputs.build_shared_libs }}-${{ steps.canonicalize.outputs.llvm_enable_assertions }}
          max-size: 500M
          variant: sccache
          save: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
      - name: Configure sccache
        id: configure-sccache
        if: steps.canonicalize.outputs.cmake_build_type == 'release'
        shell: bash
        run:
          echo enable_sccache="-DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_OUTPUT
# Configure the build.  This needs to be split into two steps as CMake options
# need to be set using a common shell that works on all OSs and supports the
# same conditional statement.  However, the actual `cmake` call needs to happen
# after the Windows development environment is setup and that cannot run in a
# `bash` shell.
      - name: Set CMake Options
        id: set-cmake-options
        shell: bash
        run: |
          # Add Valgrind arg
          LLVM_LIT_ARGS="--show-skipped --show-unsupported --show-xfail -v"
          if [[ "${{ inputs.valgrind }}" == "true" ]]; then
            LLVM_LIT_ARGS="$LLVM_LIT_ARGS --vg --vg-arg=--track-origins=yes"
          fi

          # Set CMAKE_CXX_COMPILER based on CMAKE_C_COMPILER
          CMAKE_C_COMPILER="${{ inputs.cmake_c_compiler }}"
          CMAKE_CXX_COMPILER=
          case "$CMAKE_C_COMPILER" in
            clang-*) CMAKE_CXX_COMPILER="clang++-${CMAKE_C_COMPILER#clang-}" ;;
            clang)   CMAKE_CXX_COMPILER="clang++" ;;
            gcc)     CMAKE_CXX_COMPILER="g++" ;;
            cl)      CMAKE_CXX_COMPILER="cl" ;;
          esac

          echo llvm_lit_args="$LLVM_LIT_ARGS" >> $GITHUB_OUTPUT
          echo cmake_c_compiler="$CMAKE_C_COMPILER" >> $GITHUB_OUTPUT
          echo cmake_cxx_compiler="$CMAKE_CXX_COMPILER" >> $GITHUB_OUTPUT
      - name: Configure CIRCT
        run: |
          ${{ steps.setup-windows.outputs.setup }}
          mkdir build
          cd build

          # Run cmake.  Use one long line for `cmake` so that this works on
          # Linux/macOS AND Windows.
          cmake -G Ninja -S "$(pwd)/../llvm/llvm" -DCMAKE_BUILD_TYPE=${{ inputs.cmake_build_type }} -DBUILD_SHARED_LIBS=${{ inputs.build_shared_libs }} -DLLVM_BUILD_TOOLS=ON -DLLVM_BUILD_EXAMPLES=OFF -DLLVM_ENABLE_ASSERTIONS=${{ inputs.llvm_enable_assertions }} -DLLVM_ENABLE_PROJECTS=mlir -DLLVM_EXTERNAL_PROJECTS=circt -DLLVM_EXTERNAL_CIRCT_SOURCE_DIR=".." -DLLVM_STATIC_LINK_CXX_STDLIB=ON -DLLVM_PARALLEL_LINK_JOBS=1 -DLLVM_TARGETS_TO_BUILD="host" -DLLVM_FORCE_ENABLE_STATS=ON -DLLVM_ENABLE_ZSTD=OFF -DCIRCT_RELEASE_TAG_ENABLED=ON -DCIRCT_RELEASE_TAG=firtool -DCMAKE_EXPORT_COMPILE_COMMANDS=OFF -DCMAKE_C_COMPILER=${{ steps.set-cmake-options.outputs.cmake_c_compiler }} -DCMAKE_CXX_COMPILER=${{ steps.set-cmake-options.outputs.cmake_cxx_compiler }} ${{ steps.configure-sccache.outputs.enable_sccache }} -DCMAKE_INSTALL_PREFIX="$(pwd)/../install" -DLLVM_INSTALL_UTILS=ON -DCIRCT_SLANG_FRONTEND_ENABLED=ON -DLLVM_LIT_ARGS="${{ steps.set-cmake-options.outputs.llvm_lit_args }}" ${{ steps.setup-linux.outputs.cmake }} ${{ steps.setup-macos.outputs.cmake }} ${{ steps.setup-windows.outputs.cmake }} ${{ steps.integration-test-setup-generic.outputs.cmake }}
# Optionally test
      - name: Test CIRCT
        if: inputs.run_tests
        run: |
          ${{ steps.setup-windows.outputs.setup }}
          ninja -C build check-circt check-circt-unit
      - name: Integration Test CIRCT
        if: inputs.run_integration_tests
        run: |
          ${{ steps.setup-windows.outputs.setup }}
          ninja -C build check-circt-capi check-circt-integration
      - name: Install
        if: inputs.install_target
        run: |
          ${{ steps.setup-windows.outputs.setup }}
          ninja -C build ${{ inputs.install_target }}
          file install/*
          file install/bin/*
      - name: Name Install Directory
        id: name_dir
        if: inputs.install_target
        shell: bash
        run: |
          BASE=$(git describe --tag)
          SANITIZED=$(echo -n $BASE | tr '/' '-')
          echo "value=$SANITIZED" >> "$GITHUB_OUTPUT"

          ARCH=$(echo ${{ runner.arch }} | tr '[:upper:]' '[:lower:]')
          echo arch="$ARCH" >> $GITHUB_OUTPUT

          OS=$(echo ${{ runner.os }} | tr '[:upper:]' '[:lower:]')
          echo os="$OS" >> $GITHUB_OUTPUT

          ARCHIVE=
          if [[ ${{ runner.os }} == 'Windows' ]]; then
            ARCHIVE="zip"
          else
            ARCHIVE="tar.gz"
          fi
          echo archive="$ARCHIVE" >> $GITHUB_OUTPUT

          TAR=
          if [[ ${{ runner.os }} == 'macOS' ]]; then
            TAR="gtar czf"
          else
            TAR="tar czf"
          fi
          echo tar="$TAR" >> $GITHUB_OUTPUT

          SHA256=
          if [[ ${{ runner.os }} == 'Windows' ]]; then
            SHA256="sha256sum"
          else
            SHA256="shasum -a 256"
          fi
          echo sha256="$SHA256" >> $GITHUB_OUTPUT
      - name: Name Archive
        id: name_archive
        if: inputs.install_target
        shell: bash
        run: |
          NAME=${{ inputs.package_name_prefix }}-${{ steps.name_dir.outputs.os }}-${{ steps.name_dir.outputs.arch }}.${{ steps.name_dir.outputs.archive }}
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
      - name: Package Binaries Linux and MacOS
        if: inputs.install_target && ( runner.os == 'macOS' || runner.os == 'Linux' )
        run: |
          mv install ${{ steps.name_dir.outputs.value }}
          ${{ steps.name_dir.outputs.tar }} ${{ steps.name_archive.outputs.name }} ${{ steps.name_dir.outputs.value }}
      - name: Package Binaries Windows
        if: inputs.install_target && runner.os == 'Windows'
        shell: pwsh
        run: |
          mv install ${{ steps.name_dir.outputs.value }}
          Compress-Archive -Path ${{ steps.name_dir.outputs.value }} -DestinationPath ${{ steps.name_archive.outputs.name }}
      - name: Show Tarball
        if: inputs.install_target
        shell: bash
        run: |
          ls -l ${{ steps.name_archive.outputs.name }}
          ${{ steps.name_dir.outputs.sha256 }} ${{ steps.name_archive.outputs.name }} | cut -d ' ' -f1 > ${{ steps.name_archive.outputs.name }}.sha256

# Upload build artifacts
      - name: Upload Binary (Non-Tag)
        uses: actions/upload-artifact@v4
        if: inputs.install_target && github.ref_type != 'tag'
        with:
          name: ${{ steps.name_archive.outputs.name }}
          path: ${{ steps.name_archive.outputs.name }}
          retention-days: 7
      - name: Upload SHA256 (Non-Tag)
        uses: actions/upload-artifact@v4
        if: inputs.install_target && github.ref_type != 'tag'
        with:
          name: ${{ steps.name_archive.outputs.name }}.sha256
          path: ${{ steps.name_archive.outputs.name }}.sha256
          retention-days: 7

      - name: Upload Binaries (Tag)
        uses: AButler/upload-release-assets@v3.0
        if: inputs.install_target && github.ref_type == 'tag'
        with:
          # The * will grab the .sha256 as well
          files: ${{ steps.name_archive.outputs.name }}*
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          release-tag: ${{ github.ref_name }} # Upload to release tag when manually run.
