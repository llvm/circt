name: Publish ESI Runtime

on:
  push:
    tags:
      - ESIRuntime-*
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels with ${{ matrix.config.cibw_build }}
    runs-on: ${{ matrix.config.os }}
    if: github.repository == 'llvm/circt'
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: ubuntu-24.04
            cibw_build: cp39-manylinux_x86_64
          - os: ubuntu-24.04
            cibw_build: cp310-manylinux_x86_64
          - os: ubuntu-24.04
            cibw_build: cp311-manylinux_x86_64
          - os: ubuntu-24.04
            cibw_build: cp312-manylinux_x86_64
          - os: ubuntu-24.04
            cibw_build: cp313-manylinux_x86_64
          - os: ubuntu-24.04
            cibw_build: cp314-manylinux_x86_64
          - os: windows-2022
            cibw_build: cp39-win_amd64
          - os: windows-2022
            cibw_build: cp310-win_amd64
          - os: windows-2022
            cibw_build: cp311-win_amd64
          - os: windows-2022
            cibw_build: cp312-win_amd64
          - os: windows-2022
            cibw_build: cp313-win_amd64
          - os: windows-2022
            cibw_build: cp314-win_amd64

    steps:
      - name: Get CIRCT
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install deps with choco (Windows)
        shell: pwsh
        if: runner.os == 'Windows'
        run: choco install ninja

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.3.0

      - name: Build wheels
        if: runner.os != 'Windows'
        env:
          CIBW_BUILD: ${{ matrix.config.cibw_build }}
          SETUPTOOLS_SCM_DEBUG: True
        run: python -m cibuildwheel --output-dir wheelhouse ./lib/Dialect/ESI/runtime

      - name: Build wheels (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CIBW_BUILD: ${{ matrix.config.cibw_build }}
          SETUPTOOLS_SCM_DEBUG: True
        run: |
          echo "Building wheel"
          & "${env:GITHUB_WORKSPACE}\utils\find-vs.ps1"
          python3 -m cibuildwheel --output-dir wheelhouse ./lib/Dialect/ESI/runtime

      - name: Get wheel name
        shell: bash
        id: whl-name
        run: |
          cd wheelhouse
          echo WHL=`ls *.whl` >> "$GITHUB_OUTPUT"

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.whl-name.outputs.WHL }}
          path: wheelhouse/${{ steps.whl-name.outputs.WHL }}
          retention-days: 7
          if-no-files-found: error

  push_wheels:
    name: Push wheels (Tag or Weekly)
    runs-on: ubuntu-24.04
    needs: build_wheels
    environment:
      name: pypi
      url: https://pypi.org/p/esiaccel
    permissions:
      id-token: write

    steps:
      - name: Download wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./wheelhouse/
          merge-multiple: true

      - name: List downloaded wheels
        run: ls -laR
        working-directory: ./wheelhouse/

      - name: Upload wheels to pypi
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        if: github.repository == 'llvm/circt' && (github.ref_type == 'tag' || github.event_name == 'workflow_dispatch')
        with:
          packages-dir: wheelhouse/
          verify-metadata: false
          verbose: true
