name: Test PyRTG

on:
  push:
    branches:
      - main
  pull_request:
    types: [assigned, opened, synchronize, reopened]
  workflow_dispatch:

# Cancel previous CI builds when a new push occurs to the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test-pyrtg:
    name: Build and Test PyRTG
    runs-on: ubuntu-24.04
    steps:
      # Clone the CIRCT repo and its submodules. Do shallow clone to save clone
      # time.
      - name: Get CIRCT
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          submodules: true

      # 'ld' is known to perform poorly on MLIR, so always use lld.
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang ninja-build lld

      # PyRTG requires the MLIR/CIRCT Python bindings, which need these at
      # configure/build time.
      - name: Install Python dependencies
        run: |
          pip config set global.break-system-packages true
          pip install pybind11==2.11.2 nanobind==2.9.2 psutils

      # Compiler cache. LLVM+MLIR is the bulk of the build; sccache is what makes
      # this fast. The cache is only saved on push-to-main and restored on PRs.
      - name: sccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: pyrtg-clang-release
          max-size: 500M
          variant: sccache
          save: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Configure CIRCT
        run: |
          mkdir build && cd build
          cmake -G Ninja ../llvm/llvm \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_ASSERTIONS=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DLLVM_ENABLE_PROJECTS=mlir \
            -DLLVM_EXTERNAL_PROJECTS=circt \
            -DLLVM_EXTERNAL_CIRCT_SOURCE_DIR=.. \
            -DLLVM_TARGETS_TO_BUILD="host" \
            -DLLVM_USE_LINKER=lld \
            -DLLVM_USE_SPLIT_DWARF=ON \
            -DLLVM_PARALLEL_LINK_JOBS=2 \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            -DMLIR_ENABLE_BINDINGS_PYTHON=ON \
            -DCIRCT_BINDINGS_PYTHON_ENABLED=ON \
            -DCIRCT_ENABLE_FRONTENDS=PyRTG \
            -DLLVM_LIT_ARGS="-v --show-unsupported"

      - name: Test PyRTG
        run: |
          ninja -C build check-pyrtg -j$(nproc)
