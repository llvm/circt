name: Upload Wheels

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      upload-to-pypi:
        description: 'Upload wheels to PyPi'
        required: true
        default: false
        type: boolean
      cibw-build:
        description: 'Which wheel target to build (workflow_dispatch only)'
        default: all
        type: choice
        options:
          - all
          - cp310-manylinux_x86_64
          - cp313-manylinux_x86_64
          - cp314-manylinux_x86_64
  schedule:
    - cron: 0 12 * * 1

jobs:
  select_matrix:
    name: Select wheel matrix
    runs-on: ubuntu-22.04
    if: github.repository == 'llvm/circt'
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" != "workflow_dispatch" || "${{ inputs.cibw-build }}" == "all" ]]; then
            matrix='{
              "config": [
                {"os":"ubuntu-22.04","cibw_build":"cp310-manylinux_x86_64"},
                {"os":"ubuntu-22.04","cibw_build":"cp313-manylinux_x86_64"},
                {"os":"ubuntu-22.04","cibw_build":"cp314-manylinux_x86_64"}
              ]
            }'
          else
            matrix='{
              "config": [
                {"os":"ubuntu-22.04","cibw_build":"${{ inputs.cibw-build }}"}
              ]
            }'
          fi
          {
            echo "matrix<<EOF"
            echo "$matrix"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build_wheels:
    name: Build wheels with ${{ matrix.config.cibw_build }}
    runs-on: ${{ matrix.config.os }}
    if: github.repository == 'llvm/circt'
    needs: select_matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.select_matrix.outputs.matrix) }}
    steps:
      - name: Get CIRCT
        uses: actions/checkout@v3
        with:
          fetch-depth: 2
          submodules: "true"

      - name: Unshallow CIRCT
        run: |
          git fetch --force --unshallow --tags --no-recurse-submodules

      - name: Setup Python
        uses: actions/setup-python@v3

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.3.0

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse ./lib/Bindings/Python
        env:
          CIBW_BUILD: ${{ matrix.config.cibw_build }}
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
          CIBW_BUILD_FRONTEND: build
          SETUPTOOLS_SCM_DEBUG: True

      - name: Upload (stage) wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.config.cibw_build }}
          path: ./wheelhouse/*.whl
          retention-days: 7
          if-no-files-found: error

  push_wheels:
    name: Push wheels
    runs-on: ubuntu-22.04
    if: github.repository == 'llvm/circt' && (github.ref_type == 'tag' || github.event_name == 'schedule' || ((github.event_name == 'workflow_dispatch') && inputs.upload-to-pypi))
    needs: build_wheels
    environment:
      name: pypi
      url: https://pypi.org/p/circt
    permissions:
      id-token: write

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: python-wheels-*
          merge-multiple: true
          path: ./wheelhouse/

      - name: List downloaded wheels
        run: ls -laR
        working-directory: ./wheelhouse/

      - name: Upload wheels to pypi
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheelhouse/
          verify-metadata: false
